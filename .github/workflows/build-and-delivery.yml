name: Build and Delivery
on:
  workflow_run:
    workflows: ["Test Python App"] # Ждем завершения тестов
    types: [completed]
    branches: [main] # Только если пуш был в main[cite: 1]

jobs:
  cd:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} # Только если тесты прошли[cite: 1]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}[cite: 1]
          password: ${{ secrets.DOCKERHUB_TOKEN }}[cite: 1]
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/my-app:latest[cite: 1]

